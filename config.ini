[UPSTOX]
; Secrets are loaded from environment variables in production.
; For local development, you may fill these in — but never commit real values.
client_id      =
client_secret  =
redirect_uri   = http://127.0.0.1:8080
mobile         =
password       =
pin            =
totp_secret    =
[SANDBOX]
; Set to true to use Upstox sandbox (paper trading) — no real orders placed
enabled        = true

[STRATEGY]
; yfinance tickers for SIGNAL generation (spot prices)
ticker_long    = HAL.NS
ticker_short   = BDL.NS

; Upstox instrument tokens for NSE futures
; Format: NSE_FO|<ISIN>  — look up at https://assets.upstox.com/market-quote/instruments/exchange/NSE.json.gz
; These are examples — verify the current month's contract token before use
fut_long_token  = NSE_FO|INE848E01016  ; NHPC futures instrument token
fut_short_token = NSE_FO|INE752E01010  ; POWERGRID futures instrument token

; Human-readable names (for logging only)
fut_long_name   = HAL-FUT
fut_short_name  = BDL-FUT

; Lot sizes (NSE standard — verify before live trading)
lot_long       = 3000
lot_short      = 400

; Max lots per leg
max_lots       = 1

[TIMING]
market_open    = 09:20
market_close   = 15:20
login_time     = 08:45

[PATHS]
log_file        = logs/bot.log
trade_log_file  = logs/trade_log.json
state_file      = state/position.json
token_file      = state/token.json
